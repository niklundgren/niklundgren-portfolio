    var frameAtoms = model.selectedAtoms({});
    for (var i = 0; i < frameAtoms.length; i += 1) {
      frameAtoms[i].bonds = baseAtoms[i].bonds.slice();
      frameAtoms[i].bondOrder = baseAtoms[i].bondOrder.slice();
    }
  }

  await model.setFrame(0);
  viewer.zoomTo();
  viewer.rotate(45, "x");
  viewer.rotate(45, "z");
  viewer.animate({loop: "forward", reps: 0, interval: 50});
  viewer.render();
}

initializeViewer();

function togglePlay() {
  playing = !playing;
  var playBtn = document.getElementById("playbtn");
  playBtn.textContent = playing ? "■" : "▶";
  playBtn.dataset.state = playing ? "playing" : "paused";
  playBtn.setAttribute("aria-label", playing ? "Stop animation" : "Play animation");
  if (playing) {
    viewer.animate({loop: "forward", reps: 0, interval: 50});
  } else {
    viewer.stopAnimate();
  }
}

window.addEventListener("resize", function() {
  viewer.resize();
  viewer.render();
});
</script>
</body>
</html>
